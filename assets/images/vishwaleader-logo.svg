<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 540" width="500" height="540">
  <!--
    VishwaLeader Logo — Refined SVG Recreation v3
    Colors:
      Gold  (WiFi)  : #C8971A
      Blue  (Globe) : #2166A8
      Navy  (Book)  : #1C2B3A
    Globe : center (250,358) r=138
    WiFi  : dot at (250,220) – top of globe
  -->

  <!-- ═══════════════════════════════════════ -->
  <!--  GLOBE                                  -->
  <!-- ═══════════════════════════════════════ -->

  <!-- Outer ring -->
  <circle cx="250" cy="358" r="138" fill="none" stroke="#2166A8" stroke-width="16"/>

  <!-- Center vertical meridian -->
  <line x1="250" y1="220" x2="250" y2="496" stroke="#2166A8" stroke-width="13"/>

  <!-- Equator -->
  <line x1="112" y1="358" x2="388" y2="358" stroke="#2166A8" stroke-width="13"/>

  <!-- Upper latitude arc  (y=298, chord≈(126,298)→(374,298), bows up 16px) -->
  <path d="M 126 298 Q 250 282 374 298"
        fill="none" stroke="#2166A8" stroke-width="10"/>

  <!-- Lower latitude arc  (y=418, bows down 16px) -->
  <path d="M 126 418 Q 250 434 374 418"
        fill="none" stroke="#2166A8" stroke-width="10"/>

  <!-- Left meridian  (semi-ellipse, rx=50 ry=138, bows 50px left at equator) -->
  <path d="M 250 220 A 50 138 0 0 1 250 496"
        fill="none" stroke="#2166A8" stroke-width="10"/>

  <!-- Right meridian (mirror) -->
  <path d="M 250 220 A 50 138 0 0 0 250 496"
        fill="none" stroke="#2166A8" stroke-width="10"/>


  <!-- ═══════════════════════════════════════ -->
  <!--  OPEN BOOK                              -->
  <!-- ═══════════════════════════════════════ -->
  <!--
    Original book analysis:
    - Tall, nearly-rectangular pages
    - Top outer corners wing slightly upward
    - Very subtle top curve (not dramatic)
    - Bottom flat at equator level
    - Pages extend to just inside left/right meridian curves
    Book dimensions:
      Top    : y=265  (above equator 93px)
      Bottom : y=410  (below equator 52px)
      Left   : x=172  Right: x=328   Spine: x=250
  -->

  <!-- LEFT PAGE -->
  <path d="
    M 174 410
    L 172 268
    Q 210 257 250 268
    L 250 410
    Z"
    fill="#1C2B3A"/>

  <!-- RIGHT PAGE (mirror) -->
  <path d="
    M 326 410
    L 328 268
    Q 290 257 250 268
    L 250 410
    Z"
    fill="#1C2B3A"/>

  <!-- Book spine crease -->
  <path d="M 250 268 Q 247 339 250 410"
        fill="none" stroke="#0C1924" stroke-width="5"/>


  <!-- ═══════════════════════════════════════ -->
  <!--  GOLD WiFi SIGNAL                       -->
  <!-- ═══════════════════════════════════════ -->
  <!--
    Centre dot: (250, 220)
    All arcs centred at dot, opening upward (sweep=1 L→R)
    Half-angle ≈ 62°  →  sin(62°)=0.883, cos(62°)=0.469
    Arc 1: r=34  → L(220,204) R(280,204)
    Arc 2: r=58  → L(199,193) R(301,193)
    Arc 3: r=88  → L(172,179) R(328,179)
  -->

  <!-- Dot -->
  <circle cx="250" cy="220" r="13" fill="#C8971A"/>

  <!-- Arc 1 – smallest  r=34 -->
  <path d="M 220 204 A 34 34 0 0 1 280 204"
        fill="none" stroke="#C8971A" stroke-width="18" stroke-linecap="round"/>

  <!-- Arc 2 – medium    r=58 -->
  <path d="M 199 193 A 58 58 0 0 1 301 193"
        fill="none" stroke="#C8971A" stroke-width="18" stroke-linecap="round"/>

  <!-- Arc 3 – large     r=88 -->
  <path d="M 172 179 A 88 88 0 0 1 328 179"
        fill="none" stroke="#C8971A" stroke-width="18" stroke-linecap="round"/>

</svg>
